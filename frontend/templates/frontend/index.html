{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainz Academy</title>
    <script>
      window.USER_ROLE = "{{ request.user.role|default:'' }}";
    </script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <script>
      window.renderMath = function(el) {
        renderMathInElement(el || document.body, {
          delimiters: [
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true  },
          ],
          throwOnError: false,
          strict: false,
        });
      };
    </script>

    <script
      type="module"
      crossorigin
      src="{% static 'frontend/assets/index.js' %}"
    ></script>
    <link
      rel="stylesheet"
      crossorigin
      href="{% static 'frontend/assets/index.css' %}"
    />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
