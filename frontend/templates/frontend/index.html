{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainz Academy</title>
    <script>
      window.USER_ROLE = "{{ request.user.role|default:'' }}";
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]']]
        },
        startup: {
          ready() {
            MathJax.startup.defaultReady();
            window.MathJaxReady = true;
          }
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <script
      type="module"
      crossorigin
      src="{% static 'frontend/assets/index.js' %}"
    ></script>
    <link
      rel="stylesheet"
      crossorigin
      href="{% static 'frontend/assets/index.css' %}"
    />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
