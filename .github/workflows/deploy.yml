name: Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       examprep_test
          POSTGRES_USER:     examprep
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DEBUG:              "True"
      SECRET_KEY:         "github-actions-test-secret-key-not-for-production"
      DATABASE_URL:       "postgresql://examprep:testpassword@localhost:5432/examprep_test"
      TEST_DATABASE_URL:  "postgresql://examprep:testpassword@localhost:5432/examprep_test"
      REDIS_URL:          "redis://localhost:6379/0"
      ALLOWED_HOSTS:      "localhost,127.0.0.1"
      DJANGO_SETTINGS_MODULE: "examproject.settings_test"
      ANTHROPIC_API_KEY:  "dummy-key-for-ci"
      BREVO_API_KEY:      "dummy-key-for-ci"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ui/package-lock.json

      - name: Install Node dependencies
        run: cd frontend/ui && npm ci

      - name: Build React frontend
        run: cd frontend/ui && npm run build

      - name: Run Django migrations
        run: python manage.py migrate --noinput

      - name: Run pytest suite
        run: python -m pytest tests/ -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach