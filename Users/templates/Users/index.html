{% extends 'Users/layout.html' %}

{% block body %}
<div class="container mt-5">
 <div class="row">
 <div class="col-md-8 mx-auto">
{% if user.is_authenticated %}
 <div class="d-flex justify-content-between align-items-center mb-4">
 <h2>Welcome, {{ user.first_name }}!</h2>
 <a href="{% url 'Users:logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
 </div>

 <div class="card border-0 shadow-sm mb-4">
 <div class="card-body">
 <h5 class="card-title text-primary">Student Profile</h5>
 <p class="card-text">
 <strong>Email:</strong> {{ user.email }}

<hr>

 <strong>Full Name:</strong> {{ user.first_name }} {{ user.last_name }}
 </p>
 </div>
 </div>
{% endif %}
 <div class="list-group shadow-sm">
 <div class="list-group-item bg-light fw-bold">Prepare for exams</div>



 </div>
 </div>
</div>
{% endblock %}
