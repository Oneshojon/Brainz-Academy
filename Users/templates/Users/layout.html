{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'Users/layout.css' %}" />
  </head>
  <body>
    <nav class="dash-nav">
  <a href="/" class="dash-logo">Exam<span>Prep</span></a>
  <div class="nav-right">
    {% if user.is_authenticated %}
      <div class="nav-user">
        <span>👤 {{ user.first_name|default:user.email }}</span>
        {% if user.role == 'TEACHER' %}<span class="role-pill teacher">Teacher</span>{% else %}<span class="role-pill student">Student</span>{% endif %}
      </div>
      <a href="{% url 'Users:logout' %}" class="btn-logout">Log out</a>
    {% else %}
      <a href="{% url 'Users:request_otp' %}" class="btn-login">Log in →</a>
    {% endif %}
  </div>
</nav>

    {% block body%}{% endblock %}
  </body>
</html>
