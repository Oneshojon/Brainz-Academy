{% extends 'Users/layout.html' %} {% block body %}
<div
  class="container d-flex justify-content-center align-items-center"
  style="min-height: 80vh"
>
  <div
    class="card border-0 shadow-lg"
    style="max-width: 450px; width: 100%; border-radius: 20px"
  >
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div
          class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
          style="width: 60px; height: 60px"
        >
          <i class="bi bi-shield-lock-fill fs-3"></i>
        </div>
        <p class="text-muted">
          Enter your email to receive a secure login code.
        </p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small text-center" role="alert">
        {{ error }}
      </div>
      {% endif %} {% if messages %} {% for message in messages %}
      <div class="alert {{ message.tags }}">{{ message }}</div>
      {% endfor %} {% endif %}

      <form action="{% url 'Users:request_otp' %}" method="post">
        {% csrf_token %}

        <div class="mb-4">
          <label
            for="email"
            class="form-label small fw-bold text-uppercase text-muted"
            >University Email</label
          >
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"
              ><i class="bi bi-envelope text-primary"></i
            ></span>
            <input
              type="email"
              name="email"
              id="email"
              class="form-control border-start-0 py-2"
              placeholder="name@example.com"
              required
            />
          </div>
        </div>

        <div class="d-grid">
          <button
            type="submit"
            class="btn btn-primary btn-lg fw-bold"
            style="border-radius: 10px; transition: 0.3s"
          >
            Get OTP Code
          </button>
        </div>
      </form>

      <div class="text-center mt-4">
        <p class="small text-muted mb-0">
          Issues logging in?
          <a href="#" class="text-decoration-none">Contact Support</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
