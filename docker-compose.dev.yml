version: '3.9'

# ── LOCAL DEVELOPMENT ──────────────────────────────────────────────────────────
# Usage:
#   cp .env.local.example .env.local   (fill in values — see notes below)
#   docker compose -f docker-compose.dev.yml up --build
#
# Django runserver:  http://localhost:8000  (hot-reloads on .py saves)
# Vite HMR:          http://localhost:5173  (hot-reloads on .jsx saves)
#
# On first run, create a superuser:
#   docker compose -f docker-compose.dev.yml exec web python manage.py createsuperuser

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       examprep
      POSTGRES_USER:     examprep
      POSTGRES_PASSWORD: localpassword
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"     # expose so you can inspect with pgAdmin / DBeaver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examprep"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Django (runserver) ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env.local
    environment:
      # These always override .env.local — hardwired for local Docker networking
      DATABASE_URL: postgresql://examprep:localpassword@db:5432/examprep
      REDIS_URL:    redis://redis:6379/0
      DEBUG:        "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    volumes:
      - .:/app                          # full project mount — edits reflect instantly
      - media_dev:/app/media            # persist uploaded files across restarts
      - pip_cache:/root/.cache/pip      # speed up rebuilds
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Vite dev server (React HMR) ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend/ui
    volumes:
      - .:/app
      - node_modules_dev:/app/frontend/ui/node_modules   # isolate node_modules inside container
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"   # required for file-watch on Windows/WSL inside Docker
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data_dev:
  media_dev:
  pip_cache:
  node_modules_dev: